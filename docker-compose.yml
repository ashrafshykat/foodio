version: '3.8'

services:
  db:
    image: postgres:15
    container_name: foodio-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: foodio
    ports:
      - "5432:5432"
    volumes:
      - foodio_db_data:/var/lib/postgresql/data

volumes:
  foodio_db_data:
